name: tests

on:
  push:
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install light deps
        run: pip install -r requirements-ci.txt
      - name: Run unit tests
        run: pytest tests/ -v
